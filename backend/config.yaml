# Non-secret, deployment-independent app config.
# Secrets and per-deployment overrides live in backend/.env (gitignored).


log:
  level: info  # trace | debug | info | warn | error | fatal

server:
  host: 0.0.0.0  # 0.0.0.0 so Docker/PaaS can reach the listener

# ── Chat-model benchmark (Decision 3) ─────────────────────────────
# Consumed only by `pnpm benchmark:models`. The main app boot ignores this section.
benchmark:
  # Judge runs on local Ollama (no rate limits, no external dep, no cost).
  judge:
    model: gemma2:27b
    baseUrl: http://localhost:11434/v1
  # Candidate chat-model pool. Each must currently have a live endpoint on OpenRouter
  candidates:
    - minimax/minimax-m2.5:free
    - nvidia/nemotron-3-super-120b-a12b:free
    - openai/gpt-oss-120b:free
    - z-ai/glm-4.5-air:free
  # Parallelism budget. `concurrency` = number of candidate slots running in parallel.
  concurrency: 4
  # Minimum ms between consecutive calls keyed by model id. Judge is local → 0.
  # Candidates live on different OpenRouter providers; each gets its own clock.
  throttles:
    judgeMs: 0
    candidateMs: 4000
  # Canonical refusal string interpolated into the candidate system prompt AND
  # checked programmatically on OOS/adversarial cases.
  refusalString: "I don't have information on that in the current knowledge base."
  # withBackoff retry count on 429/5xx responses.
  maxRetries: 3


# ── Vector store (Step 4) ─────────────────────────────────────────
# Consumed by `VectorModule`. Absent in test runs — the module auto-swaps to
# the in-memory FakeVectorStore when NODE_ENV=test (no Qdrant required).
vector:
  url: http://localhost:6333
  collection: agentic-systems-papers
  denseSize: 768


# ── Persistence (Step 5) ──────────────────────────────────────────
#SQLite-backed OLTP store for canonical paper metadata, sessions,
# and messages.
persistence:
  path: ./data/app.db


# ── Ingestion pipeline (Step 6) ───────────────────────────────────
# Consumed by `pnpm ingest`. Missing section → defaults from IngestionSchema.
ingestion:
  docsDir: ./docs
  chunkTargetChars: 2000      # ≈ 500 tokens
  chunkOverlapChars: 200      # ≈ 50 tokens
  # Prefix model = same local Ollama instance 
  # judge.  gemma2:27b`.
  prefixModel: gemma2:27b
  prefixBaseUrl: http://localhost:11434/v1
  # Embedder = local Ollama, 768-dim (matches vector.denseSize above).
  
  embedModel: nomic-embed-text
  embedBaseUrl: http://localhost:11434/v1
  embedBatchSize: 100


# ── Retrieval (Step 8) ────────────────────────────────────────────
# Pipeline: embed query + bm25 → dense k=20 / sparse k=20 → RRF → rerank top 8
# → MMR pick 5. Defaults match README's documented retrieval parameters.
retrieval:
  denseK: 20
  sparseK: 20
  rerankK: 8
  finalK: 5
  mmrLambda: 0.7
  rrfK: 60
  # Cross-encoder. Pulled the first time BgeReranker is used; cached under
  # ~/.cache/huggingface thereafter. Pre-pull is optional.
  
  rerankerModel: Xenova/bge-reranker-large


# ── Chat (Step 11) ────────────────────────────────────────────────
# Consumed by ChatService. `model` is the OpenRouter id locked by the
# Step 2 benchmark (see backend/eval/model-selection/results.json).
chat:
  
  model: nvidia/nemotron-3-super-120b-a12b
  temperature: 0.2
  maxOutputTokens: 1024
  refusalString: "I don't have information on that in the current knowledge base."
  userName: the user


# ── Evaluation harness 
# Consumed by `pnpm evaluate`. Uses the same ChatService the HTTP route
# uses — no drift. Runs each case through 3 ablation lanes.
eval:
  casesPath: ./eval/cases.json
  resultsPath: ./eval/results.json
  baselinePath: ./eval/baseline.json
  concurrency: 2
  # Judge on local Ollama, distinct family from chat model (Nemotron):
  # kills self-preference bias. Same process + model as contextual prefix
  # — no extra ops surface.
  judgeModel: gemma2:27b
  judgeBaseUrl: http://localhost:11434/v1
  retrievalK: 5
  successThresholds:
    relevance: 4
    groundedness: 4
  # relevance <= this is counted in failureRate.
  failureThreshold: 2
