name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: lint / typecheck / test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Unit tests
        run: pnpm test

      - name: E2E tests
        run: pnpm test:e2e
        env:
          # E2E boots AppModule → LlmModule. Use the mock LLM adapter so CI
          # doesn't need provider keys (fork PRs can't see secrets anyway).
          # AppModule also auto-mocks when NODE_ENV=test; this is belt-and-suspenders.
          LLM_ADAPTER: mock

  docker:
    name: build + push docker image
    runs-on: ubuntu-latest
    needs: check
    # `packages: write` lets the built-in GITHUB_TOKEN push to GHCR.
    # No external secrets needed.
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      # GHCR requires lowercase repository names. github.repository = "owner/repo"
      # but that may contain uppercase — force-lowercase it here.
      - name: Resolve image name
        run: |
          echo "IMAGE=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_ENV"

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build + push
        uses: docker/build-push-action@v5
        with:
          context: .
          # Push only on main pushes — PRs build-and-smoke-test without publishing.
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          load: ${{ github.event_name == 'pull_request' }}

      - name: Smoke-test image (PRs only)
        if: github.event_name == 'pull_request'
        run: |
          docker run --rm ${{ env.IMAGE }}:${{ github.sha }} node --version